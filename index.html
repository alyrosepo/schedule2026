<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Расписание из Google Sheets</title>
<style>
:root{--bg:#f6fafb;--card:#fff;--ink:#14212b;--muted:#6d7b86;--line:#dce8ec;--accent:#00b8c8;--soft:#e8fbfd;--shadow:0 14px 40px rgba(20,33,43,.10);--hour:78px;--time-col:78px;--header-h:62px;--visible-days:6;--hours:14;--grid-min:980px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#f7fdfe,#eff8fa 45%,#fff);color:var(--ink)}
.app{max-width:1540px;margin:0 auto;padding:28px}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:18px}h1{margin:0;font-size:34px;letter-spacing:-.04em;line-height:1.05}.subtitle{margin-top:8px;color:var(--muted);font-size:14px}.pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 13px;font-size:13px;box-shadow:0 6px 18px rgba(20,33,43,.05)}
.setup{display:none;margin-bottom:16px;background:#fff8e7;border:1px solid #f0d58a;border-radius:20px;padding:14px;color:#5c4510;font-size:14px}.setup code{background:rgba(255,255,255,.75);padding:2px 5px;border-radius:6px}
.controls{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:12px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:24px;padding:14px;box-shadow:var(--shadow);position:sticky;top:12px;z-index:50}input,select,button{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 14px;font-size:14px;outline:none;color:var(--ink)}input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,184,200,.14)}button{background:var(--ink);color:white;border-color:var(--ink);cursor:pointer;font-weight:750;min-width:120px}.day-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 0}.day-tab{width:auto;min-width:0;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-size:13px;box-shadow:0 6px 18px rgba(20,33,43,.05)}.day-tab.active{background:var(--accent);border-color:var(--accent);color:white}
.calendar-shell{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}.days-header{display:grid;grid-template-columns:var(--time-col) repeat(var(--visible-days),1fr);height:var(--header-h);border-bottom:1px solid var(--line);background:#fff;position:sticky;top:98px;z-index:25}.corner{border-right:1px solid var(--line);background:var(--soft)}.day-head{display:flex;align-items:center;justify-content:center;font-weight:850;border-right:1px solid var(--line);font-size:14px;letter-spacing:.01em}.day-head:last-child{border-right:none}.grid-wrap{display:grid;grid-template-columns:var(--time-col) 1fr;max-height:calc(100vh - 220px);overflow:auto;position:relative}.time-axis{position:relative;background:#fbfeff;border-right:1px solid var(--line);height:calc(var(--hour) * var(--hours))}.time-label{position:absolute;right:12px;transform:translateY(-50%);color:#7f8e98;font-size:12px;font-weight:750}.days-grid{display:grid;grid-template-columns:repeat(var(--visible-days),1fr);position:relative;height:calc(var(--hour) * var(--hours));min-width:var(--grid-min)}.day-col{position:relative;border-right:1px solid var(--line);background-image:linear-gradient(to bottom,transparent calc(var(--hour) - 1px),var(--line) calc(var(--hour) - 1px));background-size:100% var(--hour)}.day-col:last-child{border-right:none}
.event{position:absolute;border-radius:14px;padding:8px 9px;overflow:hidden;background:#fff;border:1px solid rgba(0,184,200,.34);box-shadow:0 8px 22px rgba(0,77,86,.10);border-left:5px solid var(--accent);cursor:pointer;transition:.14s transform,.14s box-shadow;min-height:42px}.event:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(0,77,86,.18);z-index:20}.event.bak{border-left-color:#111827;border-color:rgba(17,24,39,.22);background:#fbfdfe}.event-title{font-weight:850;font-size:12px;line-height:1.15;margin-bottom:5px}.event-meta{font-size:10.5px;color:var(--muted);line-height:1.25}.badge-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.badge{font-size:10px;line-height:1;border-radius:999px;padding:4px 6px;background:var(--soft);color:#087b86;font-weight:800;white-space:nowrap}.badge.dark{background:#eef1f3;color:#111827}.empty{display:none;text-align:center;padding:44px;color:var(--muted)}.modal{position:fixed;inset:0;background:rgba(10,20,30,.32);display:none;align-items:center;justify-content:center;padding:20px;z-index:200}.modal.open{display:flex}.modal-card{width:min(680px,100%);background:#fff;border-radius:28px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.24)}.modal-title{font-size:24px;font-weight:900;letter-spacing:-.03em;margin:0 0 12px}.detail-grid{display:grid;grid-template-columns:150px 1fr;gap:8px 14px;font-size:14px}.detail-grid div:nth-child(odd){color:var(--muted)}.close{margin-top:18px;width:auto;padding:11px 16px}.loading{padding:44px;text-align:center;color:var(--muted)}
@media(max-width:900px){.app{padding:18px}.hero{display:block}.pills{justify-content:flex-start;margin-top:14px}.controls{grid-template-columns:1fr}.days-header{top:0}.event-title{font-size:11px}}
</style></head>
<body><div class="app">
  <div class="hero"><div><h1>Расписание</h1><div class="subtitle" id="subtitle">Данные подтягиваются из Google Sheets</div></div><div class="pills"><div class="pill"><b id="countAll">0</b> событий</div><div class="pill"><b id="countBak">0</b> с бакалаврскими потоками</div><div class="pill" id="timePill">9:00–23:00</div></div></div>
  <div class="setup" id="setup">Вставь ссылку на опубликованный CSV в коде: <code>GOOGLE_SHEET_CSV_URL</code>. Либо открой файл так: <code>?csv=https://docs.google.com/...</code></div>
  <div class="controls"><input id="search" placeholder="Поиск: курс, аудитория, преподаватель, поток…"><select id="audience"><option value="">Все потоки / аудитории</option></select><select id="type"><option value="">Все типы занятий</option></select><button id="reset">Сбросить</button></div>
  <div class="day-tabs" id="tabs"></div>
  <div class="calendar-shell"><div class="days-header" id="daysHeader"></div><div class="grid-wrap"><div class="time-axis" id="timeAxis"></div><div class="days-grid" id="daysGrid"><div class="loading">Загружаю расписание…</div></div></div><div class="empty" id="empty">Ничего не найдено по выбранным фильтрам.</div></div>
</div>
<div class="modal" id="modal"><div class="modal-card"><h2 class="modal-title" id="modalTitle"></h2><div class="detail-grid" id="modalDetails"></div><button class="close" id="close">Закрыть</button></div></div>
<script>
// 1) Опубликуй Google Sheet как CSV.
// 2) Вставь ссылку сюда. Пример: https://docs.google.com/spreadsheets/d/e/.../pub?output=csv
const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/10-djimw0_mU9A3CKhWqlM0csKjS0BHMZB6h4rLZO_tc/export?format=csv&gid=1406986454';

const DAYS = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
let EVENTS = []; let currentDay = 'all'; let START_HOUR = 9; let END_HOUR = 23;
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function csvUrl(){ return new URLSearchParams(location.search).get('csv') || GOOGLE_SHEET_CSV_URL; }
function parseCSV(text){ const rows=[]; let row=[], cell='', q=false; for(let i=0;i<text.length;i++){ const c=text[i], n=text[i+1]; if(q){ if(c==='"'&&n==='"'){cell+='"';i++;} else if(c==='"') q=false; else cell+=c; } else { if(c==='"') q=true; else if(c===','){row.push(cell);cell='';} else if(c==='\n'){row.push(cell); rows.push(row); row=[]; cell='';} else if(c!=='\r') cell+=c; } } row.push(cell); rows.push(row); return rows.filter(r=>r.some(x=>String(x).trim()!=='')); }
function normHeader(s){return String(s||'').trim().toLowerCase().replace(/\s+/g,'_');}
function excelDate(v){ if(!v) return ''; if(/^\d+(\.\d+)?$/.test(String(v))){ const d=new Date(Math.round((Number(v)-25569)*86400*1000)); return d.toLocaleDateString('ru-RU'); } return String(v); }
function timeToMin(v){ let s=String(v||'').trim(); if(!s) return null; s=s.replace('.',':'); if(/^\d{3,4}$/.test(s)){s=s.padStart(4,'0'); return Number(s.slice(0,2))*60+Number(s.slice(2));} const m=s.match(/(\d{1,2}):(\d{2})/); return m?Number(m[1])*60+Number(m[2]):null; }
function fmtTime(v){ const m=timeToMin(v); if(m==null) return ''; return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function rowToEvent(r,i){ const get=(...keys)=>{for(const k of keys){const v=r[normHeader(k)]; if(v!==undefined && String(v).trim()!=='') return v;} return '';}; const start=get('start_time','start','начало'); const end=get('end_time','end','конец'); const startMin=timeToMin(start), endMin=timeToMin(end); const day=get('day','день'); if(!day||startMin==null||endMin==null) return null; const calendar=get('calendar','поток','аудитория_поток'); const roomAudience=get('room_audience','roomAudience','поток_по_аудитории'); return {day, dayIndex:DAYS.indexOf(day), start:fmtTime(start), end:fmtTime(end), startMin, endMin, title:get('event_title','title','курс','название'), courseId:get('course_id','courseId'), type:get('class_type','type','тип'), eventNumber:get('event_number','eventNumber'), groupNumber:get('group_number','groupNumber','группа'), level:get('level','уровень'), startDate:excelDate(get('start_date','startDate','дата_начала')), endDate:excelDate(get('end_date','endDate','дата_конца')), periodicity:get('periodicity','периодичность'), room:get('classroom','room','аудитория'), teacher:get('teacher_email','teacher','преподаватель'), calendar, roomAudience, audience:[calendar,roomAudience].filter(Boolean).join(' · '), row:i+2}; }
async function load(){ const url=csvUrl(); if(!url){ $('setup').style.display='block'; $('daysGrid').innerHTML='<div class="loading">CSV-ссылка пока не указана.</div>'; initStatic(); return; } try{ const res=await fetch(url); if(!res.ok) throw new Error(res.status+' '+res.statusText); const rows=parseCSV(await res.text()); const headers=rows.shift().map(normHeader); EVENTS=rows.map((row,idx)=>Object.fromEntries(headers.map((h,j)=>[h,row[j]??'']))).map(rowToEvent).filter(Boolean).filter(e=>DAYS.includes(e.day)); initStatic(); render(); } catch(e){ $('setup').style.display='block'; $('daysGrid').innerHTML='<div class="loading">Не получилось загрузить CSV. Проверь, что Google Sheet опубликован как CSV и доступен публично.</div>'; console.error(e); initStatic(); } }
function initStatic(){ $('tabs').innerHTML=''; ['Все дни',...DAYS].forEach((d,i)=>{let b=document.createElement('button');b.className='day-tab'+(i===0?' active':'');b.textContent=d;b.onclick=()=>{currentDay=i===0?'all':d;document.querySelectorAll('.day-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};$('tabs').appendChild(b);}); ['search','audience','type'].forEach(id=>$(id).oninput=render); $('reset').onclick=()=>{$('search').value='';$('audience').value='';$('type').value='';currentDay='all';document.querySelectorAll('.day-tab').forEach((x,i)=>x.classList.toggle('active',i===0));render();}; $('close').onclick=()=>$('modal').classList.remove('open'); $('modal').onclick=e=>{if(e.target.id==='modal')$('modal').classList.remove('open')}; }
function fillFilters(data){ const audSel=$('audience'), typeSel=$('type'); const curA=audSel.value, curT=typeSel.value; audSel.innerHTML='<option value="">Все потоки / аудитории</option>'; typeSel.innerHTML='<option value="">Все типы занятий</option>'; [...new Set(data.flatMap(e=>[e.calendar,e.roomAudience,e.audience]).filter(Boolean))].sort().forEach(a=>{let o=document.createElement('option');o.value=a;o.textContent=a;audSel.appendChild(o);}); [...new Set(data.map(e=>e.type).filter(Boolean))].sort().forEach(t=>{let o=document.createElement('option');o.value=t;o.textContent=t;typeSel.appendChild(o);}); audSel.value=curA; typeSel.value=curT; }
function filtered(){ const q=$('search').value.trim().toLowerCase(), aud=$('audience').value, typ=$('type').value; return EVENTS.filter(e=>{ if(currentDay!=='all'&&e.day!==currentDay)return false; if(aud && !((e.calendar||'').includes(aud)||(e.roomAudience||'').includes(aud)||(e.audience||'').includes(aud)))return false; if(typ&&e.type!==typ)return false; if(q){const blob=[e.title,e.room,e.teacher,e.calendar,e.roomAudience,e.audience,e.type,e.level,e.courseId].join(' ').toLowerCase(); if(!blob.includes(q))return false;} return true; });}
function layoutDay(events){ events=[...events].sort((a,b)=>a.startMin-b.startMin||a.endMin-b.endMin); let groups=[], group=[], groupEnd=-1; for(const e of events){ if(group.length && e.startMin>=groupEnd){groups.push(group); group=[]; groupEnd=-1;} group.push(e); groupEnd=Math.max(groupEnd,e.endMin); } if(group.length)groups.push(group); const pos=new Map(); for(const g of groups){ let cols=[]; for(const e of g){ let c=cols.findIndex(end=>end<=e.startMin); if(c<0){c=cols.length; cols.push(e.endMin);} else cols[c]=e.endMin; pos.set(e,{col:c,total:cols.length}); } for(const e of g) pos.get(e).total=cols.length; } return pos;}
function render(){ fillFilters(EVENTS); const data=filtered(); $('countAll').textContent=data.length; $('countBak').textContent=data.filter(e=>(e.audience||'').includes('Бак')||(e.roomAudience||'').includes('Бак')).length; $('empty').style.display=data.length?'none':'block'; const allMins=EVENTS.flatMap(e=>[e.startMin,e.endMin]).filter(Number.isFinite); if(allMins.length){START_HOUR=Math.max(0,Math.floor(Math.min(...allMins)/60)); END_HOUR=Math.min(24,Math.ceil(Math.max(...allMins)/60));} document.documentElement.style.setProperty('--hours', END_HOUR-START_HOUR); $('timePill').textContent=`${START_HOUR}:00–${END_HOUR}:00`; const visibleDays=currentDay==='all'?DAYS:[currentDay]; document.documentElement.style.setProperty('--visible-days',visibleDays.length); document.documentElement.style.setProperty('--grid-min',currentDay==='all'?'980px':'620px'); $('daysHeader').innerHTML='<div class="corner"></div>'+visibleDays.map(d=>`<div class="day-head">${esc(d)}</div>`).join(''); $('timeAxis').innerHTML=''; for(let h=START_HOUR; h<=END_HOUR; h++){let lab=document.createElement('div');lab.className='time-label';lab.style.top=((h-START_HOUR)*78)+'px';lab.textContent=String(h).padStart(2,'0')+':00';$('timeAxis').appendChild(lab);} $('daysGrid').innerHTML=''; visibleDays.forEach(day=>{ const col=document.createElement('div'); col.className='day-col'; const evs=data.filter(e=>e.day===day); const pos=layoutDay(evs); evs.forEach(e=>{ const p=pos.get(e)||{col:0,total:1}; const top=((e.startMin-START_HOUR*60)/60)*78+4; const height=Math.max(((e.endMin-e.startMin)/60)*78-8,40); const gap=4, width=(100/p.total), left=p.col*width; const card=document.createElement('div'); card.className='event '+(((e.audience||'').includes('Бак')||(e.roomAudience||'').includes('Бак'))?'bak':''); card.style.top=top+'px'; card.style.height=height+'px'; card.style.left=`calc(${left}% + ${gap}px)`; card.style.width=`calc(${width}% - ${gap*2}px)`; card.innerHTML=`<div class="event-title">${esc(e.title)}</div><div class="event-meta">${esc(e.start)}–${esc(e.end)} · ${esc(e.room||'ауд. не указана')}</div><div class="event-meta">${esc(e.calendar||e.roomAudience||'')}</div><div class="badge-row">${e.type?`<span class="badge">${esc(e.type)}</span>`:''}${(e.audience||'').includes('Бак')?`<span class="badge dark">Бак</span>`:''}${e.level?`<span class="badge">${esc(e.level)}</span>`:''}</div>`; card.onclick=()=>openModal(e); col.appendChild(card); }); $('daysGrid').appendChild(col); }); }
function openModal(e){ $('modalTitle').textContent=e.title; const details=[['День и время',`${e.day}, ${e.start}–${e.end}`],['Период',`${e.startDate||'—'} — ${e.endDate||'—'}${e.periodicity?`, периодичность: ${e.periodicity}`:''}`],['Поток',e.calendar||'—'],['Поток по аудитории',e.roomAudience||'—'],['Уровень',e.level||'—'],['Тип',e.type||'—'],['Аудитория',e.room||'—'],['Преподаватель',e.teacher||'—'],['Курс / занятие',`${e.courseId||'—'} / ${e.eventNumber||'—'}`],['Группа',e.groupNumber||'—']]; $('modalDetails').innerHTML=details.map(([k,v])=>`<div>${esc(k)}</div><div>${esc(v)}</div>`).join(''); $('modal').classList.add('open'); }
load();
</script></body></html>
